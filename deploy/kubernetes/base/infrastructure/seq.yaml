apiVersion: v1
kind: Service
metadata:
  name: seq
  namespace: auction-platform
  labels:
    app: seq
    tier: observability
spec:
  type: ClusterIP
  selector:
    app: seq
  ports:
    - name: http
      port: 5341
      targetPort: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seq
  namespace: auction-platform
  labels:
    app: seq
    tier: observability
spec:
  serviceName: seq
  replicas: 1
  selector:
    matchLabels:
      app: seq
  template:
    metadata:
      labels:
        app: seq
        tier: observability
    spec:
      containers:
        - name: seq
          image: datalust/seq:2024.3
          ports:
            - containerPort: 80
              name: http
          env:
            - name: ACCEPT_EULA
              value: "Y"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: seq-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: seq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
