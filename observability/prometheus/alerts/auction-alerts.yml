groups:
  - name: auction-platform-alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])) by (service)
            /
            sum(rate(http_server_request_duration_seconds_count[5m])) by (service)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is above 5% for {{ $labels.service }}."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket[5m])) by (le, service)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.service }}"
          description: "95th percentile latency is above 1s for {{ $labels.service }}."

      - alert: HighMemoryUsage
        expr: |
          process_resident_memory_bytes / 1024 / 1024 > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.job }}"
          description: "Memory usage is above 500MB for {{ $labels.job }}."

      - alert: CircuitBreakerOpen
        expr: |
          increase(polly_circuit_breaker_state_total{state="open"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker opened for {{ $labels.operation }}"
          description: "Circuit breaker has opened indicating downstream service issues."

      - alert: HighBidRejectionRate
        expr: |
          (
            sum(rate(bids_rejected_total[5m]))
            /
            sum(rate(bids_total[5m]))
          ) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High bid rejection rate"
          description: "More than 20% of bids are being rejected."

      - alert: MessageQueueBacklog
        expr: |
          rabbitmq_queue_messages > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Message queue backlog detected"
          description: "Queue {{ $labels.queue }} has more than 1000 pending messages."
