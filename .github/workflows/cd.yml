name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/auction-platform

jobs:
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: identity-api
            context: .
            dockerfile: src/Services/Identity/Identity.Api/Dockerfile
          - name: auction-api
            context: .
            dockerfile: src/Services/Auction/Auction.Api/Dockerfile
          - name: bidding-api
            context: .
            dockerfile: src/Services/Bidding/Bidding.Api/Dockerfile
          - name: payment-api
            context: .
            dockerfile: src/Services/Payment/Payment.Api/Dockerfile
          - name: notification-api
            context: .
            dockerfile: src/Services/Notification/Notification.Api/Dockerfile
          - name: analytics-api
            context: .
            dockerfile: src/Services/Analytics/Analytics.Api/Dockerfile
          - name: search-api
            context: .
            dockerfile: src/Services/Search/Search.Api/Dockerfile
          - name: storage-api
            context: .
            dockerfile: src/Services/Storage/Storage.Api/Dockerfile
          - name: job-api
            context: .
            dockerfile: src/Services/Job/Job.Api/Dockerfile
          - name: gateway-api
            context: .
            dockerfile: src/Gateway/Gateway.Api/Dockerfile
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine commit SHA
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.short_sha }}
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.run_number }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    environment:
      name: staging
      url: https://staging.auction-platform.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: 'v1.28.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Determine image tag
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "short_sha=${SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Deploy to Kubernetes
        run: |
          IMAGE_TAG="${{ steps.vars.outputs.short_sha }}"
          REGISTRY="${{ env.REGISTRY }}"
          PREFIX="${{ env.IMAGE_PREFIX }}"

          cd deploy/kubernetes

          SERVICES=(identity-api auction-api bidding-api payment-api notification-api analytics-api search-api storage-api job-api gateway-api)
          MANIFEST=$(kubectl kustomize overlays/staging)

          for service in "${SERVICES[@]}"; do
            MANIFEST=$(echo "$MANIFEST" | sed "s|image: auction-platform/${service}:.*|image: ${REGISTRY}/${PREFIX}/${service}:${IMAGE_TAG}|g")
          done

          echo "$MANIFEST" | kubectl apply -f -

          kubectl rollout status deployment -n auction-platform-staging --timeout=300s

      - name: Run smoke tests
        run: |
          SERVICES=(identity-api auction-api bidding-api payment-api gateway-api)
          FAILED=0

          for service in "${SERVICES[@]}"; do
            READY=$(kubectl get deploy "staging-${service}" -n auction-platform-staging -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            if [[ "$READY" -lt 1 ]]; then
              echo "❌ staging-${service} has no ready replicas"
              FAILED=1
            else
              echo "✅ staging-${service} is ready (${READY} replicas)"
            fi
          done

          if [[ $FAILED -eq 1 ]]; then
            echo "::error::Smoke tests failed"
            exit 1
          fi

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://auction-platform.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: 'v1.28.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Determine image tag
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "short_sha=${SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Deploy to Kubernetes
        run: |
          IMAGE_TAG="${{ steps.vars.outputs.short_sha }}"
          REGISTRY="${{ env.REGISTRY }}"
          PREFIX="${{ env.IMAGE_PREFIX }}"

          cd deploy/kubernetes

          SERVICES=(identity-api auction-api bidding-api payment-api notification-api analytics-api search-api storage-api job-api gateway-api)
          MANIFEST=$(kubectl kustomize overlays/production)

          for service in "${SERVICES[@]}"; do
            MANIFEST=$(echo "$MANIFEST" | sed "s|image: .*/${service}:[^ ]*|image: ${REGISTRY}/${PREFIX}/${service}:${IMAGE_TAG}|g")
          done

          echo "$MANIFEST" | kubectl apply -f -

          for deployment in "${SERVICES[@]}"; do
            echo "Rolling out $deployment..."
            kubectl rollout status deployment/$deployment -n auction-platform --timeout=300s
          done

      - name: Verify deployment
        run: |
          SERVICES=(identity-api auction-api bidding-api payment-api gateway-api)

          for service in "${SERVICES[@]}"; do
            READY=$(kubectl get deploy "${service}" -n auction-platform -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            if [[ "$READY" -lt 1 ]]; then
              echo "${service} has no ready replicas"
              exit 1
            fi
            echo "${service} is ready (${READY} replicas)"
          done

      - name: Notify on success
        if: success()
        run: echo "Production deployment successful!"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, initiating rollback..."
          SERVICES=(identity-api auction-api bidding-api payment-api notification-api analytics-api search-api storage-api job-api gateway-api)
          for deployment in "${SERVICES[@]}"; do
            kubectl rollout undo deployment/$deployment -n auction-platform || true
          done
