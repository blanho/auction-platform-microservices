input {
  tcp {
    port => 5044
    codec => json_lines
  }
  
  beats {
    port => 5045
  }
}

filter {
  if [fields][service] {
    mutate {
      add_field => { "service_name" => "%{[fields][service]}" }
    }
  }

  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed_message"
    }
  }

  if [parsed_message][Properties] {
    ruby {
      code => '
        props = event.get("[parsed_message][Properties]")
        if props.is_a?(Hash)
          props.each do |key, value|
            event.set("[#{key}]", value)
          end
        end
      '
    }
  }

  if [parsed_message][Level] {
    mutate {
      add_field => { "log_level" => "%{[parsed_message][Level]}" }
    }
  }

  if [TraceId] {
    mutate {
      add_field => { "trace_id" => "%{[TraceId]}" }
    }
  }

  if [SpanId] {
    mutate {
      add_field => { "span_id" => "%{[SpanId]}" }
    }
  }

  date {
    match => [ "[parsed_message][Timestamp]", "ISO8601" ]
    target => "@timestamp"
  }

  mutate {
    remove_field => [ "parsed_message" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "auction-logs-%{+YYYY.MM.dd}"
    template_name => "auction-logs"
    template_overwrite => true
  }

  stdout {
    codec => rubydebug
  }
}
