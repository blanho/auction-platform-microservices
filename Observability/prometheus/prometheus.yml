global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auction-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['auction-api:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'auction-api'

  - job_name: 'bid-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['bid-api:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'bid-api'

  - job_name: 'payment-api'
